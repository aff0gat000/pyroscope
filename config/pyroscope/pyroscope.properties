# Shared Pyroscope Java agent configuration.
# Loaded automatically from /opt/pyroscope/pyroscope.properties at JVM startup.
#
# Per-service overrides (application.name, labels) are set via environment
# variables in docker-compose.yaml. Env vars take precedence over this file.
#
# Precedence: System Properties (-D) > Environment Variables > This File
#
# Performance impact: ~3-5% CPU, ~30 MB memory per JVM.
# All four profile types enabled for maximum observability.

pyroscope.server.address=http://pyroscope:4040
pyroscope.format=jfr

# --- CPU profiling ---
# itimer is safer than cpu/perf (no perf_events kernel dependency, works in
# containers without CAP_PERFMON). 10ms sample interval = ~100 samples/sec,
# which balances detail against overhead.
pyroscope.profiler.event=itimer
pyroscope.profiler.interval=10ms

# --- Allocation profiling ---
# Track heap allocations to identify GC pressure and memory-heavy code paths.
# 512k threshold means only allocations >= 512 KB are sampled individually;
# smaller allocations are sampled probabilistically. This keeps overhead under
# 1% while still capturing the allocations that matter for GC tuning.
pyroscope.profiler.alloc=512k

# --- Lock / contention profiling ---
# Capture lock wait times to find threading bottlenecks (synchronized blocks,
# ReentrantLock, monitor contention). 10ms threshold filters out trivial
# uncontended locks — only waits >= 10ms are recorded.
pyroscope.profiler.lock=10ms

# --- Upload tuning ---
# Push profiles every 10 seconds (default). Shorter intervals give faster
# feedback in Grafana but increase network overhead. 10s is the sweet spot
# for production — low enough latency for live debugging, high enough to
# batch efficiently.
pyroscope.upload.interval=10s

# --- Basic labels ---
# Static labels applied to all profiles from this JVM. Per-service labels
# (application name, service name) are set via env vars in docker-compose.yaml.
pyroscope.labels=env=production

pyroscope.log.level=warn
