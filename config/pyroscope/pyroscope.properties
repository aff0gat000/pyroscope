# =============================================================================
# PYROSCOPE JAVA AGENT CONFIGURATION
# =============================================================================
# Shared configuration for all JVM pods. Loaded automatically at JVM startup
# from /opt/pyroscope/pyroscope.properties via PYROSCOPE_CONFIGURATION_FILE.
#
# Per-service overrides (application name, labels) are set via environment
# variables in docker-compose.yaml / pod spec. Env vars take precedence.
#
# Precedence: System Properties (-D) > Environment Variables > This File
#
# Tuned for: ~50 Vert.x servers, thousands of deployed functions/verticles.
# Goal: maximum thread-level visibility with bounded, predictable overhead.
#
# Expected overhead per JVM: ~3-5% CPU, ~50 MB memory.
# At 50 servers: ~25 KB/s aggregate network to Pyroscope server.
#
# WHAT THIS CONFIGURATION CAPTURES:
#   1. CPU hotspots    — which functions burn the most CPU cycles (itimer)
#   2. Heap allocations — which functions create GC pressure (alloc)
#   3. Lock contention  — where threads block waiting for each other (lock)
#   4. Thread wait time  — where threads spend time waiting, not just computing (wall)
#
# WHAT THIS DOES NOT CAPTURE (requires OpenTelemetry / distributed tracing):
#   - Causal request flow across threads (A sent EventBus msg → B handled it)
#   - EventBus message routing, latency between send() and handler invocation
#   - End-to-end request traces spanning multiple verticles or services
#
# See docs/agent-configuration-reference.md for full documentation.

pyroscope.server.address=http://pyroscope:4040
pyroscope.format=jfr

# =============================================================================
# CPU PROFILING (itimer)
# =============================================================================
# WHAT IT SHOWS:
#   Flame graphs of where CPU time is spent — per-function, per-thread.
#   In Grafana: select profile type "cpu" to see CPU flame graphs.
#
# WHY itimer:
#   - No perf_events kernel dependency (no CAP_PERFMON needed in containers)
#   - No safepoint bias — samples mid-execution, not just at JVM safepoints
#   - Captures both event-loop threads and worker pool threads equally
#   - Works in unprivileged OpenShift containers (restricted SCC)
#
# HOW TO READ IT:
#   Wide bars = functions consuming lots of CPU. Look for:
#   - Hot event-loop handlers (should be fast — if wide, they're blocking)
#   - Worker pool functions (expected to be CPU-heavy)
#   - Unexpected framework overhead (codec serialization, JSON parsing)
#
# 10ms interval = ~100 samples/sec per JVM. With thousands of functions, this
# captures enough unique stack frames for detailed flame graphs. Faster
# intervals (5ms) double overhead with diminishing returns.
#
# OVERHEAD: ~2% CPU (constant, does not increase with application load)
pyroscope.profiler.event=itimer
pyroscope.profiler.interval=10ms

# =============================================================================
# WALL-CLOCK PROFILING
# =============================================================================
# WHAT IT SHOWS:
#   Where threads spend time WAITING — not just computing. This is the closest
#   Pyroscope gets to showing thread communication and cross-thread hand-offs.
#
#   In Grafana: select profile type "wall" to see wall-clock flame graphs.
#
# WHY THIS MATTERS FOR VERT.X THREAD CONTEXT:
#   CPU profiling only shows executing code. Wall-clock profiling also shows:
#   - Event-loop threads waiting for EventBus.request() replies
#   - Worker threads waiting for I/O (database, HTTP client, file system)
#   - Threads blocked on Future.await() / Promise completion
#   - Worker pool queue wait time (executeBlocking backpressure)
#   - Thread hand-off latency between event-loop and worker pool
#
# HOW TO READ CROSS-THREAD PATTERNS:
#   Compare wall-clock flame graphs side-by-side for event-loop vs worker threads:
#   1. Filter by thread name "vert.x-eventloop-*" — see where event loops wait
#   2. Filter by thread name "vert.x-worker-*" — see what workers compute
#   3. If event-loop shows long waits on EventBus.request(), and workers show
#      corresponding handler execution, you've found the communication path
#   4. Lock contention profiles (below) fill in the gaps — showing where
#      threads directly block each other
#
# 20ms interval: wall profiling samples ALL threads (including waiting ones),
# so it generates more data than CPU profiling. 20ms keeps overhead manageable
# with thousands of verticles where many threads may be idle.
#
# OVERHEAD: ~1-2% CPU additional (on top of itimer)
pyroscope.profiler.wall=20ms

# =============================================================================
# ALLOCATION PROFILING
# =============================================================================
# WHAT IT SHOWS:
#   Which functions allocate the most heap memory — the root cause of GC
#   pressure, long GC pauses, and OOM kills.
#
#   In Grafana: select profile type "alloc_in_new_tlab_objects" or
#   "alloc_in_new_tlab_bytes" to see allocation flame graphs.
#
# WHY THIS MATTERS FOR VERT.X:
#   Async event-loop architecture means short-lived objects dominate:
#   - HTTP request/response buffers (Netty ByteBuf wrappers)
#   - JSON parse results (JsonObject/JsonArray per request)
#   - EventBus message serialization (codec encode/decode per message)
#   - Lambda captures and CompositeFuture wrappers in async chains
#
#   These show up as allocation hotspots. If you see heavy allocation on
#   event-loop threads, it means the event loop is doing too much object
#   creation — potential for GC-induced latency spikes.
#
# CROSS-THREAD RELEVANCE:
#   EventBus messages are serialized by the sender thread and deserialized by
#   the receiver thread. Allocation profiles show both sides:
#   - Sender: allocations in MessageCodec.encodeToWire()
#   - Receiver: allocations in MessageCodec.decodeFromWire()
#   High allocation on either side means the codec is inefficient or messages
#   are too large.
#
# 256k threshold: captures allocation sites across thousands of functions.
# async-profiler samples probabilistically below this threshold.
#
# OVERHEAD: ~0.5-1% CPU
pyroscope.profiler.alloc=256k

# =============================================================================
# LOCK / CONTENTION PROFILING
# =============================================================================
# WHAT IT SHOWS:
#   Where threads BLOCK waiting for locks held by other threads. This is the
#   most direct view of thread-to-thread interaction that profiling can provide.
#
#   In Grafana: select profile type "lock_count" or "lock_duration" to see
#   contention flame graphs.
#
# WHY THIS IS CRITICAL FOR VERT.X THREAD CONTEXT:
#   Lock contention profiles show the exact points where threads interact:
#
#   1. EVENT-LOOP BLOCKING (the #1 Vert.x performance killer):
#      If you see lock waits on event-loop threads, something is blocking the
#      event loop. The flame graph shows exactly which synchronized block,
#      ReentrantLock, or monitor is the culprit — and which other thread holds it.
#
#   2. WORKER POOL HAND-OFFS:
#      executeBlocking() uses a queue between event-loop and worker threads.
#      Contention on that queue shows up in lock profiles when the worker pool
#      is saturated.
#
#   3. SHARED STATE BETWEEN VERTICLES:
#      If two verticles access a shared ConcurrentHashMap, synchronized cache,
#      or connection pool, the lock profile shows the contention point and
#      which threads are fighting.
#
#   4. CLASSLOADER CONTENTION:
#      With thousands of verticles, class loading can become a bottleneck.
#      The JVM's ClassLoader uses internal locks. Lock profiles reveal if
#      deployment/undeployment of verticles causes contention.
#
# HOW TO TRACE THREAD COMMUNICATION VIA LOCK PROFILES:
#   Lock flame graphs show two things in the stack trace:
#   - The BLOCKED thread (waiting to acquire the lock) — this is the "receiver"
#   - The lock object class — tells you what shared resource is contested
#   To find the "sender" (the thread holding the lock), look at CPU profiles
#   for the same time window — the thread that's executing inside the same
#   lock object is the holder.
#
# 10ms threshold: captures meaningful contention. Lock waits < 10ms are
# typically uncontended acquisitions that resolve in microseconds.
#
# OVERHEAD: < 0.5% CPU
pyroscope.profiler.lock=10ms

# =============================================================================
# UPLOAD TUNING — optimized for 50 concurrent servers
# =============================================================================
# 15s interval: with 50 servers pushing 4 profile types simultaneously, this
# reduces peak ingest load on the Pyroscope server by ~33% vs the 10s default.
#
# Math: 50 servers × ~40 KB payload (4 types) / 15s = ~130 KB/s aggregate.
# Well within monolith capacity.
#
# Each push batches more samples, which compresses better (larger payloads
# have better gzip ratios), so effective bandwidth is lower than linear.
pyroscope.upload.interval=15s

# =============================================================================
# THREAD FILTERING — expanded for thread context visibility
# =============================================================================
# To see how threads communicate, we need to profile ALL thread types that
# participate in request processing and verticle execution:
#
#   vert.x-eventloop-*          Event-loop threads — where verticles run,
#                                EventBus handlers execute, HTTP handlers fire.
#                                These should NEVER block. If lock contention
#                                appears on these threads, it's a critical issue.
#
#   vert.x-worker-*             Worker pool threads — where executeBlocking()
#                                runs. Expected to do CPU-heavy or blocking work.
#                                Compare wall-clock profiles between event-loop
#                                and worker threads to see hand-off patterns.
#
#   vert.x-internal-blocking-*  Internal blocking pool — used by Vert.x itself
#                                for DNS resolution, file system operations, and
#                                some internal tasks. If these are contended,
#                                verticle deployment/undeployment may be slow.
#
# EXCLUDED (noise reduction):
#   - globalEventExecutor, nioEventLoopGroup (Netty I/O boss — low-level TCP)
#   - blocked-thread-checker (Vert.x watchdog — not your code)
#   - GC threads, JIT compiler threads, JMX threads
#   - Finalizer, Reference Handler, Signal Dispatcher
#
# To add more threads (e.g., custom named thread pools, Hazelcast clustering):
#   Append patterns separated by |
#   Example: ...|hazelcast-*|my-custom-pool-*
pyroscope.profiler.include=vert.x-eventloop-*|vert.x-worker-*|vert.x-internal-blocking-*

# =============================================================================
# LABELS
# =============================================================================
# Static labels applied to all profiles from this JVM. Per-service labels
# (application name, service) are set via env vars in docker-compose.yaml.
#
# Labels are how you slice data in Grafana. With thousands of functions across
# 50 servers, you filter by: application name, service, env.
#
# IMPORTANT: Keep label cardinality bounded. Do NOT use:
#   - Dynamic request IDs or user IDs (creates millions of label combinations)
#   - Verticle instance IDs (use verticle class name instead)
#   - Timestamps or counters
pyroscope.labels=env=production

# =============================================================================
# LOGGING
# =============================================================================
# warn: agent logs only errors and important warnings. Avoids flooding
# application logs with per-push debug messages (50 servers × 4 pushes/min
# × 4 profile types = 800 log lines/min at info level).
pyroscope.log.level=warn
