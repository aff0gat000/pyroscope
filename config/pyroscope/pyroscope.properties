# Shared Pyroscope Java agent configuration.
# Loaded automatically from /opt/pyroscope/pyroscope.properties at JVM startup.
#
# Per-service overrides (application.name, labels) are set via environment
# variables in docker-compose.yaml. Env vars take precedence over this file.
#
# Precedence: System Properties (-D) > Environment Variables > This File
#
# Tuned for: ~50 Vert.x servers, thousands of deployed functions/verticles.
# Goal: maximum profiling data with bounded, predictable overhead.
#
# Expected overhead per JVM: ~2-4% CPU, ~50 MB memory.
# At 50 servers: ~25 KB/s aggregate network to Pyroscope server.

pyroscope.server.address=http://pyroscope:4040
pyroscope.format=jfr

# =============================================================================
# CPU PROFILING
# =============================================================================
# itimer (interval timer) is the right choice for Vert.x on OpenShift:
#   - No perf_events kernel dependency (no CAP_PERFMON needed in containers)
#   - No safepoint bias — samples mid-execution, not just at JVM safepoints
#   - Captures both event-loop threads and worker pool threads equally
#
# 10ms interval = ~100 samples/sec. With thousands of functions, this captures
# enough unique stack frames to build detailed flame graphs while keeping CPU
# overhead to ~2%. Faster intervals (e.g. 5ms) double overhead with diminishing
# returns — 10ms is the standard production sweet spot.
pyroscope.profiler.event=itimer
pyroscope.profiler.interval=10ms

# =============================================================================
# ALLOCATION PROFILING
# =============================================================================
# Critical for Vert.x: async event-loop architecture means short-lived objects
# (buffers, JSON parse results, HTTP request/response wrappers) dominate heap
# allocations. Allocation profiling finds the functions creating GC pressure.
#
# 256k threshold (lowered from 512k): captures more allocation sites across
# thousands of functions. With many small verticles each allocating buffers,
# a lower threshold ensures we see allocation patterns per-function, not just
# the largest allocators. Overhead increase is marginal (~0.5%) because
# async-profiler samples probabilistically below the threshold.
#
# If overhead is a concern, raise to 512k. If you need even more detail for
# a specific investigation, temporarily lower to 128k on targeted pods only.
pyroscope.profiler.alloc=256k

# =============================================================================
# LOCK / CONTENTION PROFILING
# =============================================================================
# Essential for Vert.x servers with thousands of functions: verticle deployment,
# class loading, shared EventBus handlers, and worker thread hand-offs all use
# locks. Contention profiling identifies:
#   - Event-loop blocking (the #1 Vert.x performance killer)
#   - Worker pool exhaustion from synchronized code paths
#   - Shared resource contention between co-deployed verticles
#
# 10ms threshold: captures meaningful lock waits (blocked threads waiting for
# monitors, ReentrantLocks, or synchronized blocks). Filters out trivial
# uncontended acquisitions that complete in microseconds. With thousands of
# functions, this is the right balance — low enough to catch event-loop
# blocking, high enough to avoid noise from fast lock acquisitions.
pyroscope.profiler.lock=10ms

# =============================================================================
# UPLOAD TUNING — optimized for 50 concurrent servers
# =============================================================================
# 15s interval (raised from 10s default): with 50 servers pushing profiles
# simultaneously, this reduces peak ingest load on the Pyroscope server by
# ~33% while adding only 5 seconds of latency to Grafana visibility.
#
# Math: 50 servers × ~30 KB payload / 15s = ~100 KB/s aggregate. Well within
# monolith capacity. At 10s it would be ~150 KB/s — still fine, but 15s gives
# headroom as you scale toward 100 servers without changing config.
#
# Each push batches more samples, which compresses better (larger payloads
# have better gzip ratios), so effective bandwidth is lower than linear.
pyroscope.upload.interval=15s

# =============================================================================
# THREAD FILTERING
# =============================================================================
# Vert.x creates many internal threads (acceptor, blocked-thread-checker,
# internal timers). Profile only the threads that execute your functions:
#   - vert.x-eventloop-*    — event-loop threads (where verticles run)
#   - vert.x-worker-*       — worker pool (executeBlocking calls)
#
# This reduces noise in flame graphs by excluding Netty I/O boss threads,
# JVM internals, and GC threads. With thousands of functions, cleaner flame
# graphs are significantly easier to navigate.
#
# If you also need to profile Netty I/O or custom named threads, append
# their patterns: e.g. vert.x-eventloop-*|vert.x-worker-*|nioEventLoop*
pyroscope.profiler.include=vert.x-eventloop-*|vert.x-worker-*

# =============================================================================
# LABELS
# =============================================================================
# Static labels applied to all profiles from this JVM. Per-service labels
# (application name, service) are set via env vars in docker-compose.yaml.
#
# With thousands of functions across 50 servers, labels are how you slice
# the data in Grafana. Keep label cardinality bounded — use fixed values,
# not dynamic request IDs or user IDs.
pyroscope.labels=env=production

# =============================================================================
# LOGGING
# =============================================================================
# warn: agent logs only errors and important warnings. Avoids flooding
# application logs with per-push debug messages (50 servers × 4 pushes/min
# = 200 log lines/min at info level).
pyroscope.log.level=warn
