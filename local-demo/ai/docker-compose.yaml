name: pyroscope-local-demo-ai

networks:
  ai:

volumes:
  postgres-data:
  minio-data:
  mlflow-data:
  airflow-logs:
  ollama-data:

x-common-env: &common-env
  PYROSCOPE_URL: ${PYROSCOPE_URL:-http://host.docker.internal:4041}
  POSTGRES_DSN: postgresql://postgres:postgres@postgres:5432/ai
  MLFLOW_TRACKING_URI: http://mlflow:5000
  MINIO_ENDPOINT: http://minio:9000
  MINIO_ACCESS_KEY: minioadmin
  MINIO_SECRET_KEY: minioadmin
  LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
  OLLAMA_URL: http://ollama:11434
  OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
  GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
  GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports: ["${POSTGRES_PORT:-15433}:5432"]
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./config/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks: [ai]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2024-10-29T16-01-48Z
    container_name: ai-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "${MINIO_PORT:-19000}:9000"
      - "${MINIO_CONSOLE_PORT:-19001}:9001"
    volumes: [minio-data:/data]
    networks: [ai]

  minio-init:
    image: minio/mc:RELEASE.2024-10-29T15-34-59Z
    container_name: ai-minio-init
    depends_on: [minio]
    networks: [ai]
    entrypoint: ["sh","-c"]
    command:
      - |
        set -e
        until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 2; done
        mc mb -p local/mlflow || true
        mc mb -p local/artifacts || true

  mlflow:
    build: ./config/mlflow
    container_name: ai-mlflow
    depends_on:
      postgres: { condition: service_healthy }
      minio-init: { condition: service_started }
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    volumes: [mlflow-data:/mlflow]
    ports: ["${MLFLOW_PORT:-15000}:5000"]
    networks: [ai]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:5000/health', timeout=3).status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  ollama:
    image: ollama/ollama:0.3.14
    container_name: ai-ollama
    ports: ["${OLLAMA_PORT:-11434}:11434"]
    volumes: [ollama-data:/root/.ollama]
    networks: [ai]

  ollama-init:
    image: curlimages/curl:8.5.0
    container_name: ai-ollama-init
    depends_on: [ollama]
    networks: [ai]
    entrypoint: ["sh","-c"]
    command:
      - |
        set -e
        until curl -sf http://ollama:11434/api/tags >/dev/null; do sleep 2; done
        curl -sS http://ollama:11434/api/pull -d "{\"name\":\"${OLLAMA_MODEL:-llama3.2:3b}\"}" || true

  airflow:
    build: ./config/airflow
    container_name: ai-airflow
    depends_on:
      postgres: { condition: service_healthy }
      mlflow: { condition: service_started }
    environment:
      <<: *common-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@postgres:5432/airflow
      AIRFLOW__WEBSERVER__SECRET_KEY: local-demo-ai
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "False"
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
      PYTHONPATH: /opt/airflow/lib
    volumes:
      - ./dags:/opt/airflow/dags:ro
      - ./lib:/opt/airflow/lib:ro
      - airflow-logs:/opt/airflow/logs
    ports: ["${AIRFLOW_PORT:-18081}:8080"]
    extra_hosts: ["host.docker.internal:host-gateway"]
    networks: [ai]
    command: ["standalone"]

  api:
    build: ./apps/api
    container_name: ai-api
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      <<: *common-env
    volumes:
      - ./lib:/app/lib:ro
    ports: ["${API_PORT:-18000}:8000"]
    extra_hosts: ["host.docker.internal:host-gateway"]
    networks: [ai]

  web:
    build: ./apps/web
    container_name: ai-web
    depends_on: [api]
    ports: ["${WEB_PORT:-18500}:80"]
    networks: [ai]

  simulator:
    build: ./apps/simulator
    container_name: ai-simulator
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      <<: *common-env
      JVM11_URL: http://host.docker.internal:18080
      JVM21_URL: http://host.docker.internal:18081
    volumes:
      - ./lib:/app/lib:ro
    extra_hosts: ["host.docker.internal:host-gateway"]
    networks: [ai]
    profiles: ["simulate"]
