name: pyroscope-local-demo

networks:
  demo:

volumes:
  pyroscope-data:
  grafana-data:
  prometheus-data:
  postgres-data:
  mongo-data:
  couchbase-data:

services:
  pyroscope:
    image: grafana/pyroscope:1.8.0
    container_name: demo-pyroscope
    command: ["-config.file=/etc/pyroscope/config.yaml"]
    ports: ["${PYROSCOPE_PORT:-4041}:4040"]
    volumes:
      - pyroscope-data:/data
      - ./config/pyroscope/pyroscope.yaml:/etc/pyroscope/config.yaml:ro
    networks: [demo]

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: demo-prometheus
    command: ["--config.file=/etc/prometheus/prometheus.yaml"]
    ports: ["${PROMETHEUS_PORT:-9091}:9090"]
    volumes:
      - ./config/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
      - prometheus-data:/prometheus
    networks: [demo]

  grafana:
    image: grafana/grafana:11.5.2
    container_name: demo-grafana
    ports: ["${GRAFANA_PORT:-3001}:3000"]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      # Pyroscope datasource is built-in to Grafana 11 as
      # grafana-pyroscope-datasource — no plugin install needed.
      # The separate grafana-pyroscope-app plugin breaks the Explore tab,
      # so it is intentionally not installed here.
      GF_INSTALL_PLUGINS: yesoreyeram-infinity-datasource
      GF_FEATURE_TOGGLES_ENABLE: flameGraph
    extra_hosts: ["host.docker.internal:host-gateway"]
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on: [pyroscope, prometheus]
    networks: [demo]

  redis:
    image: redis:7-alpine
    container_name: demo-redis
    ports: ["${REDIS_PORT:-16379}:6379"]
    networks: [demo]

  postgres:
    image: postgres:16-alpine
    container_name: demo-postgres
    environment:
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
      POSTGRES_DB: demo
    ports: ["${POSTGRES_PORT:-15432}:5432"]
    volumes: [postgres-data:/var/lib/postgresql/data]
    networks: [demo]

  mongo:
    image: mongo:7
    container_name: demo-mongo
    ports: ["${MONGO_PORT:-17017}:27017"]
    volumes: [mongo-data:/data/db]
    networks: [demo]

  couchbase:
    image: couchbase:community-7.2.0
    # Couchbase CE 7.2 is linux/amd64 only. On Apple Silicon (M-series)
    # this runs under Rosetta 2 emulation — functional but slower to start.
    # Bump to community-7.6.x+ for native arm64 once stability is verified.
    platform: linux/amd64
    container_name: demo-couchbase
    ports: ["${COUCHBASE_PORT:-18091}:8091"]
    volumes: [couchbase-data:/opt/couchbase/var]
    networks: [demo]

  couchbase-init:
    image: curlimages/curl:8.5.0
    container_name: demo-couchbase-init
    depends_on: [couchbase]
    networks: [demo]
    entrypoint: ["sh","-c"]
    command:
      - |
        set -e
        echo "Waiting for Couchbase..."
        until curl -sf http://couchbase:8091/ui/index.html >/dev/null; do sleep 3; done
        sleep 5
        curl -sS -X POST http://couchbase:8091/pools/default -d memoryQuota=512 -d indexMemoryQuota=256 || true
        curl -sS http://couchbase:8091/node/controller/setupServices -d services=kv || true
        curl -sS http://couchbase:8091/settings/web -d port=8091 -d username=Administrator -d password=password || true
        sleep 3
        curl -sS -u Administrator:password -X POST http://couchbase:8091/pools/default/buckets \
          -d name=demo -d ramQuotaMB=128 -d bucketType=couchbase || true
        echo "Couchbase initialized."

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: demo-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks: [demo]

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: demo-kafka
    depends_on: [zookeeper]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,HOST://localhost:${KAFKA_PORT:-19092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports: ["${KAFKA_PORT:-19092}:29092"]
    networks: [demo]

  vault:
    image: hashicorp/vault:1.17
    container_name: demo-vault
    cap_add: [IPC_LOCK]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports: ["${VAULT_PORT:-18200}:8200"]
    networks: [demo]

  vault-init:
    image: hashicorp/vault:1.17
    container_name: demo-vault-init
    depends_on: [vault]
    networks: [demo]
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root
    entrypoint: ["sh","-c"]
    command:
      - |
        set -e
        until vault status >/dev/null 2>&1; do sleep 1; done
        vault kv put secret/demo value=hello-from-vault || true

  demo-jvm11:
    build: ./apps/demo-jvm11
    container_name: demo-jvm11
    depends_on: [pyroscope, redis, postgres, mongo, kafka, vault]
    environment:
      JAVA_TOOL_OPTIONS: "-javaagent:/opt/pyroscope/pyroscope.jar"
      PYROSCOPE_APPLICATION_NAME: demo-jvm11
      PYROSCOPE_LABELS: "service=demo-jvm11,jvm=11,env=local-demo"
      PYROSCOPE_CONFIGURATION_FILE: /opt/pyroscope/pyroscope.properties
      REDIS_URL: redis://redis:6379
      PG_HOST: postgres
      PG_DB: demo
      PG_USER: demo
      PG_PASS: demo
      MONGO_URL: mongodb://mongo:27017
      CB_HOST: couchbase
      CB_USER: Administrator
      CB_PASS: password
      CB_BUCKET: demo
      KAFKA_BROKERS: kafka:9092
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root
    volumes:
      - ./config/pyroscope/pyroscope.properties:/opt/pyroscope/pyroscope.properties:ro
    ports: ["${DEMO_JVM11_PORT:-18080}:8080"]
    networks: [demo]

  demo-jvm21:
    build: ./apps/demo-jvm21
    container_name: demo-jvm21
    depends_on: [pyroscope, redis, postgres, mongo, kafka, vault]
    environment:
      JAVA_TOOL_OPTIONS: "-javaagent:/opt/pyroscope/pyroscope.jar"
      PYROSCOPE_APPLICATION_NAME: demo-jvm21
      PYROSCOPE_LABELS: "service=demo-jvm21,jvm=21,env=local-demo"
      PYROSCOPE_CONFIGURATION_FILE: /opt/pyroscope/pyroscope.properties
      REDIS_URL: redis://redis:6379
      PG_HOST: postgres
      PG_DB: demo
      PG_USER: demo
      PG_PASS: demo
      MONGO_URL: mongodb://mongo:27017
      CB_HOST: couchbase
      CB_USER: Administrator
      CB_PASS: password
      CB_BUCKET: demo
      KAFKA_BROKERS: kafka:9092
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root
    volumes:
      - ./config/pyroscope/pyroscope.properties:/opt/pyroscope/pyroscope.properties:ro
    ports: ["${DEMO_JVM21_PORT:-18081}:8080"]
    networks: [demo]

  k6:
    image: grafana/k6:0.51.0
    container_name: demo-k6
    depends_on: [demo-jvm11, demo-jvm21]
    networks: [demo]
    profiles: ["load"]
    volumes:
      - ./config/k6:/scripts:ro
    command: ["run","--vus","10","--duration","5m","/scripts/load.js"]
    environment:
      JVM11_URL: http://demo-jvm11:8080
      JVM21_URL: http://demo-jvm21:8080
