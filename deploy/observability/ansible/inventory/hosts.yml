---
# Static inventory — list your VMware VMs here.
#
# Group hosts by role. A single VM can be in multiple groups.
# Override per-host variables inline or in host_vars/<hostname>.yml.
#
# For dynamic VMware discovery, replace this file with:
#   plugin: community.vmware.vmware_vm_inventory
#   hostname: vcenter.corp.example.com
#   username: "{{ lookup('env', 'VMWARE_USER') }}"
#   password: "{{ lookup('env', 'VMWARE_PASSWORD') }}"
#   validate_certs: false
#   groups:
#     pyroscope: "'pyroscope' in tags"

all:
  children:
    # Full-stack deployment: Pyroscope + Grafana on the same VM
    pyroscope_full_stack:
      hosts:
      # vm01.corp.example.com:
      # vm02.corp.example.com:

    # Add-to-existing: VMs that already have Grafana
    pyroscope_add_to_existing:
      hosts:
      # grafana01.corp.example.com:
      #   grafana_url: http://localhost:3000
      #   grafana_api_key: "eyJrIj..."

  vars:
    ansible_user: operator
    ansible_become: true
    ansible_become_method: su
    # For pbrun: ansible_become_method: pbrun
    # ansible_become_exe: /usr/local/bin/pbrun
