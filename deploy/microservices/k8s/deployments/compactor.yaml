apiVersion: apps/v1
kind: Deployment
metadata:
  name: pyroscope-compactor
  namespace: pyroscope
  labels:
    app.kubernetes.io/name: pyroscope
    app.kubernetes.io/component: compactor
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pyroscope
      app.kubernetes.io/component: compactor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pyroscope
        app.kubernetes.io/component: compactor
    spec:
      containers:
        - name: compactor
          image: grafana/pyroscope:latest
          imagePullPolicy: IfNotPresent
          args:
            - -target=compactor
            - -config.file=/etc/pyroscope/config.yaml
          ports:
            - name: http
              containerPort: 4040
            - name: memberlist
              containerPort: 7946
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /etc/pyroscope
            - name: data
              mountPath: /data/pyroscope
      volumes:
        - name: config
          configMap:
            name: pyroscope-config
        - name: data
          persistentVolumeClaim:
            claimName: pyroscope-data
