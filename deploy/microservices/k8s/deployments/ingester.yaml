apiVersion: apps/v1
kind: Deployment
metadata:
  name: pyroscope-ingester
  namespace: pyroscope
  labels:
    app.kubernetes.io/name: pyroscope
    app.kubernetes.io/component: ingester
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: pyroscope
      app.kubernetes.io/component: ingester
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pyroscope
        app.kubernetes.io/component: ingester
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: pyroscope
                    app.kubernetes.io/component: ingester
                topologyKey: kubernetes.io/hostname
      containers:
        - name: ingester
          image: grafana/pyroscope:latest
          imagePullPolicy: IfNotPresent
          args:
            - -target=ingester
            - -config.file=/etc/pyroscope/config.yaml
          ports:
            - name: http
              containerPort: 4040
            - name: memberlist
              containerPort: 7946
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /etc/pyroscope
            - name: data
              mountPath: /data/pyroscope
      volumes:
        - name: config
          configMap:
            name: pyroscope-config
        - name: data
          persistentVolumeClaim:
            claimName: pyroscope-data
