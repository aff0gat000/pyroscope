# Pyroscope shared configuration — microservices mode (S3-compatible object storage)
# Docs: https://grafana.com/docs/pyroscope/latest/configure-server/

server:
  http_listen_port: 4040

storage:
  backend: s3
  s3:
    endpoint: ${S3_ENDPOINT:-http://minio:9000}
    bucket_name: ${S3_BUCKET:-pyroscope}
    access_key_id: ${S3_ACCESS_KEY_ID:-pyroscope}
    secret_access_key: ${S3_SECRET_ACCESS_KEY:-supersecret}
    insecure: true

memberlist:
  join_members:
    - ingester-1:7946
    - ingester-2:7946
    - ingester-3:7946

self_profiling:
  disable_push: true
