# Pyroscope microservices deployment (S3-compatible object storage)
# Runs each Pyroscope component as a separate service for HA/scalability.
# Requires S3-compatible object storage (MinIO, AWS S3, GCS, or Azure Blob).
# A MinIO container is included for local/dev use; replace with your S3 endpoint in production.
#
# Usage:
#   docker compose up -d
#   docker compose down

x-pyroscope-env: &pyroscope-env
  S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
  S3_BUCKET: ${S3_BUCKET:-pyroscope}
  S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-pyroscope}
  S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-supersecret}

services:

  # -- Object storage (MinIO) — replace with external S3 in production ---------

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-pyroscope}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-supersecret}
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"    # S3 API
      - "9001:9001"    # MinIO console

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3 &&
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/$${S3_BUCKET} &&
      exit 0
      "
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-pyroscope}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-supersecret}
      S3_BUCKET: ${S3_BUCKET:-pyroscope}

  # -- Write path --------------------------------------------------------------

  distributor:
    image: grafana/pyroscope:latest
    command:
      - -target=distributor
      - -config.file=/etc/pyroscope/config.yaml
      - -memberlist.join=ingester-1:7946
    environment: *pyroscope-env
    volumes:
      - ./pyroscope.yaml:/etc/pyroscope/config.yaml:ro
    depends_on:
      - minio-init
    ports:
      - "4040:4040"    # Push endpoint for SDKs

  ingester-1:
    image: grafana/pyroscope:latest
    command:
      - -target=ingester
      - -config.file=/etc/pyroscope/config.yaml
      - -memberlist.join=ingester-2:7946
    environment: *pyroscope-env
    volumes:
      - ./pyroscope.yaml:/etc/pyroscope/config.yaml:ro
    depends_on:
      - minio-init

  ingester-2:
    image: grafana/pyroscope:latest
    command:
      - -target=ingester
      - -config.file=/etc/pyroscope/config.yaml
      - -memberlist.join=ingester-1:7946
    environment: *pyroscope-env
    volumes:
      - ./pyroscope.yaml:/etc/pyroscope/config.yaml:ro
    depends_on:
      - minio-init

  ingester-3:
    image: grafana/pyroscope:latest
    command:
      - -target=ingester
      - -config.file=/etc/pyroscope/config.yaml
      - -memberlist.join=ingester-1:7946
    environment: *pyroscope-env
    volumes:
      - ./pyroscope.yaml:/etc/pyroscope/config.yaml:ro
    depends_on:
      - minio-init

  # -- Read path ---------------------------------------------------------------

  query-frontend:
    image: grafana/pyroscope:latest
    command:
      - -target=query-frontend
      - -config.file=/etc/pyroscope/config.yaml
      - -memberlist.join=ingester-1:7946
    environment: *pyroscope-env
    volumes:
      - ./pyroscope.yaml:/etc/pyroscope/config.yaml:ro
    depends_on:
      - minio-init
    ports:
      - "4041:4040"    # Query endpoint (Grafana data source)

  query-scheduler:
    image: grafana/pyroscope:latest
    command:
      - -target=query-scheduler
      - -config.file=/etc/pyroscope/config.yaml
      - -memberlist.join=ingester-1:7946
    environment: *pyroscope-env
    volumes:
      - ./pyroscope.yaml:/etc/pyroscope/config.yaml:ro
    depends_on:
      - minio-init

  querier-1:
    image: grafana/pyroscope:latest
    command:
      - -target=querier
      - -config.file=/etc/pyroscope/config.yaml
      - -memberlist.join=ingester-1:7946
    environment: *pyroscope-env
    volumes:
      - ./pyroscope.yaml:/etc/pyroscope/config.yaml:ro
    depends_on:
      - minio-init

  querier-2:
    image: grafana/pyroscope:latest
    command:
      - -target=querier
      - -config.file=/etc/pyroscope/config.yaml
      - -memberlist.join=ingester-1:7946
    environment: *pyroscope-env
    volumes:
      - ./pyroscope.yaml:/etc/pyroscope/config.yaml:ro
    depends_on:
      - minio-init

  # -- Background --------------------------------------------------------------

  compactor:
    image: grafana/pyroscope:latest
    command:
      - -target=compactor
      - -config.file=/etc/pyroscope/config.yaml
      - -memberlist.join=ingester-1:7946
    environment: *pyroscope-env
    volumes:
      - ./pyroscope.yaml:/etc/pyroscope/config.yaml:ro
    depends_on:
      - minio-init

  store-gateway:
    image: grafana/pyroscope:latest
    command:
      - -target=store-gateway
      - -config.file=/etc/pyroscope/config.yaml
      - -memberlist.join=ingester-1:7946
    environment: *pyroscope-env
    volumes:
      - ./pyroscope.yaml:/etc/pyroscope/config.yaml:ro
    depends_on:
      - minio-init

volumes:
  minio-data:
