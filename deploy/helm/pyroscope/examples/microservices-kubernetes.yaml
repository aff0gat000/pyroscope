# Microservices on vanilla Kubernetes with nginx Ingress.
#
# Usage:
#   helm upgrade --install pyroscope deploy/helm/pyroscope/ \
#       -n pyroscope --create-namespace \
#       -f deploy/helm/pyroscope/examples/microservices-kubernetes.yaml
#
# Prerequisites:
#   - S3-compatible object storage (MinIO, AWS S3, GCS, or Azure Blob)
#   - nginx ingress controller
#
# Agent target: http://pyroscope-distributor.pyroscope.svc:4040

mode: microservices

image:
  tag: "1.18.0"

storage:
  accessMode: ReadWriteOnce
  size: 10Gi    # PVC for ingester WAL only; profile data lives in S3
  s3:
    endpoint: "http://minio.minio.svc:9000"    # Adjust to your S3-compatible endpoint
    bucketName: pyroscope
    accessKeyId: pyroscope
    secretAccessKey: supersecret
    insecure: true                              # Set false for TLS endpoints (AWS S3, etc.)

distributor:
  replicas: 1

ingester:
  replicas: 3

querier:
  replicas: 2

queryFrontend:
  replicas: 1

queryScheduler:
  replicas: 1

compactor:
  replicas: 1

storeGateway:
  replicas: 1

route:
  enabled: false

ingress:
  enabled: true
  className: nginx
  host: pyroscope.example.com
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
  tls:
    enabled: false

grafana:
  location: different-namespace
