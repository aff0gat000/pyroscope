{{- if eq .Values.mode "monolith" }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pyroscope.fullname" . }}
  labels:
    {{- include "pyroscope.componentLabels" (dict "ctx" . "component" "monolith") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 4040
      targetPort: http
  selector:
    {{- include "pyroscope.selectorLabels" (dict "ctx" . "component" "monolith") | nindent 4 }}
{{- end }}
