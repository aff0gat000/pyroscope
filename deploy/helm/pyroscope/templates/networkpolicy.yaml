{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "pyroscope.fullname" . }}-allow-ingress
  labels:
    {{- include "pyroscope.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: {{ include "pyroscope.name" . }}
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 4040
          protocol: TCP
      from:
        - podSelector: {}
        {{- range .Values.networkPolicy.allowedNamespaces }}
        - namespaceSelector:
            matchLabels:
              {{- range $k, $v := . }}
              {{ $k }}: {{ $v | quote }}
              {{- end }}
        {{- end }}
{{- end }}
